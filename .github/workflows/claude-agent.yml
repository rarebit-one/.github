name: Claude Code Agent

on:
  workflow_call:

env:
  # Single source of truth for the Claude model across this repo's Claude
  # workflows. Override org-wide via the CLAUDE_MODEL Actions variable; the
  # literal is a safe fallback so an unset var can't yield an empty --model.
  CLAUDE_MODEL: "${{ vars.CLAUDE_MODEL || 'claude-opus-4-8' }}"

jobs:
  claude:
    name: Claude Code Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # main@2.1.160 (thinking-block 400 fix; ahead of release v1.0.133 — see rarebit-ops#119)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # Pin the model so the interactive agent doesn't silently shift when
          # the action's default changes. Keep in lockstep with claude-code-review.yml.
          claude_args: '--model ${{ env.CLAUDE_MODEL }}'
