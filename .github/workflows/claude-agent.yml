name: Claude Code Agent

on:
  workflow_call:

env:
  # Single source of truth for the Claude model across this repo's Claude
  # workflows. Override org-wide via the CLAUDE_MODEL Actions variable; the
  # literal is a safe fallback so an unset var can't yield an empty --model.
  CLAUDE_MODEL: "${{ vars.CLAUDE_MODEL || 'claude-opus-4-8' }}"

jobs:
  claude:
    name: Claude Code Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # Pin the model so the interactive agent doesn't silently shift when
          # the action's default changes. Keep in lockstep with claude-code-review.yml.
          # --effort high: this is a coding/correctness lane (issue-triggered PR
          # agent), so it hardcodes the high tier rather than reading the
          # CLAUDE_EFFORT estate floor.
          claude_args: '--model ${{ env.CLAUDE_MODEL }} --effort high'
