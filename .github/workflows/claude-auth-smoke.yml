name: Claude Auth Smoke

# Guards against a broken anthropics/claude-code-action pin landing on main.
# The normal "Claude Code Review" gate deliberately SKIPS Claude on Dependabot
# PRs to save budget, so a bad cca bump (e.g. an action build that 401s with
# "Invalid bearer token") would pass green. This gate runs the PR HEAD's workflow
# (pull_request, not pull_request_target) so its probe uses the newly-bumped pin,
# and only when a claude-code-action@ pin actually changed in the diff — every
# other PR passes instantly at zero LLM spend. See the 2026-07-07 auth outage.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: claude-auth-smoke-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Claude auth smoke
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect claude-code-action pin change
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if git diff "${BASE_SHA}...${HEAD_SHA}" | grep -E '^[+-].*anthropics/claude-code-action@' >/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "A claude-code-action pin changed in this PR — running the auth probe."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No claude-code-action pin change — skipping the probe (instant green)."
          fi

      - name: Require token when a pin changed (fail closed)
        if: steps.detect.outputs.changed == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::A claude-code-action pin changed but CLAUDE_CODE_OAUTH_TOKEN is unavailable (on Dependabot PRs add it as a Dependabot secret: gh secret set CLAUDE_CODE_OAUTH_TOKEN --org rarebit-one --app dependabot --visibility all). Failing closed — do not merge an unverified pin."
            exit 1
          fi

      - name: Auth probe — exercise the newly-pinned action
        id: probe
        if: steps.detect.outputs.changed == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce  # v1.0.168 (lockstep-bumped by Dependabot with the repo's other cca pins)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}          # pass a token so the action skips OIDC (unavailable to Dependabot runs)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: false
          prompt: |
            Auth smoke test — reply with exactly the single word: pong
            Do not use any tools.

      - name: Assert the probe authenticated
        if: steps.detect.outputs.changed == 'true'
        env:
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
          EXEC: ${{ steps.probe.outputs.execution_file }}
        run: |
          set -euo pipefail
          fail() { echo "::error::Claude auth probe FAILED ($1) — the newly-pinned claude-code-action cannot authenticate. Do not merge this bump."; exit 1; }
          # claude-code-action exits 0 even on auth failure (it records is_error in
          # its execution_file), so we must NOT trust the exit code alone.
          [ "${PROBE_OUTCOME}" = "success" ] || fail "step outcome=${PROBE_OUTCOME}"
          [ -n "${EXEC:-}" ] && [ -f "${EXEC}" ] || fail "no execution output produced"
          grep -Eq '"is_error"[[:space:]]*:[[:space:]]*true' "${EXEC}" && fail "execution reported is_error=true"
          echo "✓ Auth probe authenticated cleanly — pin is good."
