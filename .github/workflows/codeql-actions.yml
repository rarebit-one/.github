name: CodeQL (Actions)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Run on every PR. A `paths:` filter would skip the workflow on PRs
    # that don't touch `.github/workflows/**`, but this check is required
    # by branch protection — a skipped run leaves the required check in
    # "Expected — Waiting for status to be reported" forever, which
    # blocks every governance-only or doc-only PR. The CodeQL Actions
    # analyzer is fast enough to run unconditionally.
  schedule:
    - cron: '30 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.36.2 (bundle 2.25.2)
        with:
          languages: actions
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.36.2 (bundle 2.25.2)
        with:
          category: "/language:actions"
