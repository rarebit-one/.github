name: CodeQL (Actions)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Run on every PR. A `paths:` filter would skip the workflow on PRs
    # that don't touch `.github/workflows/**`, but this check is required
    # by branch protection — a skipped run leaves the required check in
    # "Expected — Waiting for status to be reported" forever, which
    # blocks every governance-only or doc-only PR. The CodeQL Actions
    # analyzer is fast enough to run unconditionally.
  schedule:
    - cron: '30 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v4 (bundle 2.25.2)
        with:
          languages: actions
      - uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v4 (bundle 2.25.2)
        with:
          category: "/language:actions"
