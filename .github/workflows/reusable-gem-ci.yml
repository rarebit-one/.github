name: Reusable Gem CI

# Reusable CI workflow for Ruby gems in the rarebit-one organization.
#
# Consumers reference this with:
#
#   jobs:
#     ci:
#       uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v1
#       with:
#         ruby-versions: '["4.0.3"]'
#
# See docs/reusable-workflows.md for the full input contract.

on:
  workflow_call:
    inputs:
      ruby-versions:
        description: 'JSON array string of Ruby versions for the test matrix, e.g. ''["4.0.0","4.0.3"]''. When omitted or set to ''[]'', the test job is skipped (lint-only).'
        required: false
        type: string
        default: '[]'
      lint-ruby-version:
        description: 'Ruby version used for the lint job.'
        required: false
        type: string
        default: '4.0.3'
      lint-cache-paths:
        description: 'Multiline string of paths to cache around the primary lint command (e.g. RuboCop result cache). When set together with lint-cache-key, wraps the lint step with actions/cache.'
        required: false
        type: string
        default: ''
      lint-cache-key:
        description: 'Cache key for lint-cache-paths. Required when lint-cache-paths is set; ignored otherwise.'
        required: false
        type: string
        default: ''
      apt-packages:
        description: 'Space-separated apt packages to install before bundle/test (e.g. "google-chrome-stable libyaml-dev").'
        required: false
        type: string
        default: ''
      pre-test-commands:
        description: 'Multiline shell commands to run before the test command (e.g. db setup, asset build).'
        required: false
        type: string
        default: ''
      test-command:
        description: 'Command used by the test job.'
        required: false
        type: string
        default: 'bundle exec rspec'
      lint-command:
        description: 'Primary lint command (rubocop by default).'
        required: false
        type: string
        default: 'bundle exec rubocop -f github'
      extra-lint-commands:
        description: 'Multiline shell commands to run after the primary lint command (brakeman, bundler-audit, etc.).'
        required: false
        type: string
        default: ''
      upload-screenshots:
        description: 'When true, upload tmp/screenshots/ as an artifact on test failure.'
        required: false
        type: boolean
        default: false
      concurrency-group:
        description: 'Optional override for the workflow concurrency group. When empty, a sensible default is used by consumers.'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ inputs.concurrency-group != '' && inputs.concurrency-group || format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: ${{ inputs.lint-ruby-version }}
          bundler-cache: true

      - name: Restore lint cache
        if: ${{ inputs.lint-cache-paths != '' && inputs.lint-cache-key != '' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ inputs.lint-cache-paths }}
          key: ${{ inputs.lint-cache-key }}

      - name: Lint code for consistent style
        run: ${{ inputs.lint-command }}

      - name: Run extra lint commands
        if: ${{ inputs.extra-lint-commands != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cat <<'RAREBIT_EXTRA_LINT_EOF' | bash -euo pipefail
          ${{ inputs.extra-lint-commands }}
          RAREBIT_EXTRA_LINT_EOF

  test-matrix:
    if: ${{ inputs.ruby-versions != '' && inputs.ruby-versions != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ fromJSON(inputs.ruby-versions) }}
    name: Ruby ${{ matrix.ruby }}
    steps:
      - name: Install apt packages
        if: ${{ inputs.apt-packages != '' }}
        env:
          APT_PACKAGES: ${{ inputs.apt-packages }}
        run: |
          sudo apt-get update
          # shellcheck disable=SC2086
          sudo apt-get install --no-install-recommends -y $APT_PACKAGES

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run pre-test commands
        if: ${{ inputs.pre-test-commands != '' }}
        shell: bash
        env:
          RAILS_ENV: test
        run: |
          set -euo pipefail
          cat <<'RAREBIT_PRE_TEST_EOF' | bash -euo pipefail
          ${{ inputs.pre-test-commands }}
          RAREBIT_PRE_TEST_EOF

      - name: Run tests
        env:
          RAILS_ENV: test
        run: ${{ inputs.test-command }}

      - name: Keep screenshots from failed system tests
        if: ${{ failure() && inputs.upload-screenshots }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshots-${{ matrix.ruby }}
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  # Aggregator that fans the matrix into a single check named `test`.
  # Branch protection on consumer repos can require `<caller-job> / test`
  # without enumerating every Ruby leg, so adding/removing a Ruby version
  # in `ruby-versions` doesn't require updating protection in each repo.
  test:
    needs: test-matrix
    # Run regardless of test-matrix result so a failing leg fails this
    # aggregator instead of skipping it. GitHub branch protection treats
    # skipped checks as passing — without `if: always()`, a failing
    # matrix leg would skip this job and silently satisfy the required
    # check. `success` and `skipped` (lint-only mode) both count as
    # passing; anything else fails the aggregator.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check matrix result
        env:
          MATRIX_RESULT: ${{ needs.test-matrix.result }}
        run: |
          case "$MATRIX_RESULT" in
            success|skipped)
              echo "test-matrix: $MATRIX_RESULT"
              ;;
            *)
              echo "test-matrix failed: $MATRIX_RESULT"
              exit 1
              ;;
          esac
