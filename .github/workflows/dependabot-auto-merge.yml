name: Auto-lander (Dependabot + autonomous engine PRs)

# Org-shared reusable auto-lander. A thin per-repo caller
# (dependabot-auto-merge.yml, `on: pull_request_target`) invokes this so the
# logic lives in one place — mirrors the claude-code-review reusable+caller
# pattern. It lands two classes of PR by enabling squash auto-merge (GitHub
# merges once the repo's required checks go green):
#
#   1. Dependabot PRs — read the semver update-type via fetch-metadata, then
#      enable auto-merge for patch + minor. Major bumps are left for a human.
#   2. Autonomous SRE engine PRs — branches prefixed issue-worker/, ci-fix/, or
#      sentry-autofix/, opened by the SRE engine workflows. These are already
#      vetted by the engine's own guardrails before opening, so they get
#      auto-merge enabled directly (no semver gate).
#
# Safety: the caller fires on pull_request_target (writable token), but this
# workflow checks out no PR code and runs no PR bundle — it only reads metadata
# and calls the gh API. The only privileged action is "approve + enable
# auto-merge", which still defers the actual merge to the required-checks gate.

on:
  workflow_call:

jobs:
  auto-merge:
    # Act on Dependabot's own PRs and on autonomous SRE engine PRs. The engine
    # path is gated on BOTH the release-bot App actor AND the head-ref prefix:
    # the actor gate closes a branch-name spoofing hole — otherwise anyone able
    # to push a `ci-fix/*` (etc.) branch would get native auto-merge enabled on
    # their PR (landing on required-checks-green with no human review). Only the
    # release-bot App opens genuine engine PRs, so require its login too.
    if: >-
      github.actor == 'dependabot[bot]' ||
      (github.actor == 'rarebit-one[bot]' && (
        startsWith(github.event.pull_request.head.ref, 'issue-worker/') ||
        startsWith(github.event.pull_request.head.ref, 'ci-fix/') ||
        startsWith(github.event.pull_request.head.ref, 'sentry-autofix/')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        if: github.actor == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge for patch/minor
        if: >-
          github.actor == 'dependabot[bot]' && (
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL" || true
          gh pr merge --auto --squash "$PR_URL" || echo "::warning::auto-merge not enabled for $PR_URL"

      - name: Enable auto-merge — autonomous SRE engine PR
        # Actor-gated (not just `!= dependabot[bot]`) so a spoofed engine-prefix
        # branch from any other actor can't reach this step.
        if: github.actor == 'rarebit-one[bot]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Engine PRs (issue-worker/*, ci-fix/*, sentry-autofix/*) are already
          # vetted by the engine's own guardrails (path guards, diff-line cap,
          # test gate, signed commit) before opening — so just enable squash
          # auto-merge and let the repo's required-checks gate do the rest, the
          # same as Dependabot.
          gh pr merge --auto --squash "$PR_URL" || echo "::warning::auto-merge not enabled for $PR_URL"
