name: Reusable Gem Release

# Reusable Release workflow for Ruby gems in the rarebit-one organization.
#
# Consumers reference this with:
#
#   on:
#     push:
#       tags:
#         - "v*"
#
#   jobs:
#     release:
#       uses: rarebit-one/.github/.github/workflows/reusable-gem-release.yml@v1
#       with:
#         gem-name: standard_id
#       permissions:
#         contents: write
#         id-token: write
#
# See docs/reusable-workflows.md for the full input contract.

on:
  workflow_call:
    inputs:
      gem-name:
        description: 'The gem name (matches spec.name in the gemspec).'
        required: true
        type: string
      ruby-version:
        description: 'Ruby version used to verify the tag and publish to RubyGems.'
        required: false
        type: string
        default: '4.0.3'
      version-file:
        description: 'Path to the file containing VERSION. Defaults to lib/<gem-name>/version.rb.'
        required: false
        type: string
        default: ''
      changelog-path:
        description: 'Path to the CHANGELOG file used to extract release notes.'
        required: false
        type: string
        default: 'CHANGELOG.md'
      sibling-checkouts:
        description: |
          JSON array of sibling repositories to clone before `bundle install`
          in the publish job. Each entry is an object with `repo`
          (`<owner>/<name>`), `path` (filesystem path relative to the gem
          checkout, typically `../<name>`), and optional `ref` (branch, tag,
          or SHA; defaults to the repository's default branch). Used by gems
          whose Gemfile resolves a `path:` dependency on a sibling repo, so
          `bundler-cache: true` can resolve before publish. Defaults to `[]`
          (no sibling checkouts).
        required: false
        type: string
        default: '[]'
    secrets:
      slack-bot-token:
        description: >-
          Slack bot token (xoxb-…) with chat:write, used to narrate the release
          to #releases as a thread. OPTIONAL and fail-soft: when absent (caller
          does not pass `secrets: inherit` or this secret), the narration steps
          no-op and the release runs exactly as before. Reusable workflows do
          NOT auto-inherit caller secrets, so a caller must opt in with
          `secrets: inherit` (or `secrets: { slack-bot-token: ... }`) for this
          to light up. Pairs with the caller's `vars.SLACK_RELEASE_CHANNEL_ID`
          org variable (resolved in the caller's context).
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{ inputs.ruby-version }}

      - name: Verify tag matches gem version
        env:
          GEM_NAME: ${{ inputs.gem-name }}
          VERSION_FILE_INPUT: ${{ inputs.version-file }}
        run: |
          tag_version="${GITHUB_REF_NAME#v}"

          # The gemspec sources its version from lib/<gem-name>/version.rb, so
          # this check transitively validates that file. Loading the gemspec
          # here is the same approach each gem's standalone release.yml uses.
          gem_version=$(ruby -e "spec = Gem::Specification.load(Dir['*.gemspec'].first); puts spec.version")
          if [ "$tag_version" != "$gem_version" ]; then
            echo "::error::Tag version ($tag_version) does not match gemspec version ($gem_version)"
            exit 1
          fi

          # Confirm the version file exists at the expected path so a missing
          # or moved file is surfaced before publish rather than at gem build.
          version_file="${VERSION_FILE_INPUT}"
          if [ -z "$version_file" ]; then
            # Convert e.g. standard_id-apple -> lib/standard_id/apple/version.rb
            version_file="lib/${GEM_NAME//-//}/version.rb"
          fi
          if [ ! -f "$version_file" ]; then
            echo "::warning::Version file not found at $version_file (gemspec version still passed)"
          fi

      - name: Extract changelog entry
        id: changelog
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") found=1
              next
            }
            found { print }
          ' "$CHANGELOG_PATH")

          if [ -z "$notes" ]; then
            echo "::error::No ${CHANGELOG_PATH} entry found for version $version"
            exit 1
          fi

          # Use a random delimiter to prevent injection via changelog content
          delimiter="EOF_$(openssl rand -hex 8)"
          {
            echo "notes<<${delimiter}"
            echo "$notes"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf "%s" "$RELEASE_NOTES" > /tmp/release_notes.txt
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release_notes.txt

  publish:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: rubygems
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── Slack narration: thread root ──────────────────────────────────
      # Posts the start-of-release message and captures its `thread_ts`, so the
      # outcome reply below threads under it. Fail-soft: with no token/channel
      # the composite no-ops and the release proceeds untouched. The full ref
      # (rarebit-one/.github/.github/actions/...@main) is required because a
      # reusable workflow resolves `uses: ./...` against the CALLER, not this
      # repo. Use the @main moving ref (same as the vendored composite's source).
      - name: Slack — gem release started
        id: slack
        continue-on-error: true
        uses: rarebit-one/.github/.github/actions/slack-deploy-thread@main
        with:
          bot_token: ${{ secrets.slack-bot-token }}
          channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
          mode: start
          text: |
            💎 *Gem release started* — `${{ github.repository }}` ${{ github.ref_name }}
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>

      - name: Clone sibling repositories
        if: ${{ inputs.sibling-checkouts != '' && inputs.sibling-checkouts != '[]' }}
        env:
          SIBLING_CHECKOUTS: ${{ inputs.sibling-checkouts }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Validate JSON and iterate. Each entry: { "repo": "owner/name", "path": "../name", "ref": "optional" }
          count=$(echo "$SIBLING_CHECKOUTS" | jq 'length')
          for i in $(seq 0 $((count - 1))); do
            repo=$(echo "$SIBLING_CHECKOUTS" | jq -r ".[$i].repo")
            path=$(echo "$SIBLING_CHECKOUTS" | jq -r ".[$i].path")
            ref=$(echo "$SIBLING_CHECKOUTS" | jq -r ".[$i].ref // empty")
            if [ -z "$repo" ] || [ "$repo" = "null" ] || [ -z "$path" ] || [ "$path" = "null" ]; then
              echo "::error::sibling-checkouts entry $i missing required 'repo' or 'path'"
              exit 1
            fi
            echo "Cloning $repo into $path${ref:+ @ $ref}"
            git clone --depth 1 ${ref:+--branch "$ref"} \
              "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" \
              "$path"
          done

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      # Configure RubyGems credentials via OIDC trusted publishing, then build
      # and push directly. We deliberately do NOT use rubygems/release-gem here
      # because it loads rubygems-attestation-patch.rb (via RUBYOPT), which
      # produces Sigstore attestations whose certificate SAN contains the
      # *reusable* workflow's ref (e.g. refs/tags/v1) rather than the consuming
      # gem's tag (e.g. refs/tags/v0.1.0). The RubyGems server-side verifier in
      # OIDC::TrustedPublisher::GitHubAction#SigstorePolicy#verify constructs
      # the expected identity URL using the consuming gem's source-ref OID
      # (1.3.6.1.4.1.57264.1.14) and the trusted publisher's workflow path —
      # which guarantees a SAN mismatch for any gem published via a reusable
      # workflow. Until that verifier uses the cert's Build Config URI OID
      # (1.3.6.1.4.1.57264.1.16) instead, attestation is unusable here.
      #
      # OIDC trusted publishing (no API keys) is preserved by
      # configure-rubygems-credentials, which performs the OIDC exchange and
      # populates GEM_HOST_API_KEY for the subsequent gem push.

      - name: Configure RubyGems credentials via OIDC
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Build gem
        env:
          GEM_NAME: ${{ inputs.gem-name }}
        run: gem build "${GEM_NAME}.gemspec"

      - name: Push gem to RubyGems
        env:
          GEM_NAME: ${{ inputs.gem-name }}
        run: gem push "${GEM_NAME}"-*.gem

      # ── Slack narration: outcome reply ────────────────────────────────
      # Always runs so a failure is narrated too. Threads under the root via the
      # `thread_ts` captured above; an empty thread_ts (root skipped/failed)
      # makes the composite no-op. job.status is success only if every prior
      # step (incl. publish) passed. Fail-soft via continue-on-error.
      - name: Slack — gem release outcome
        if: always()
        continue-on-error: true
        uses: rarebit-one/.github/.github/actions/slack-deploy-thread@main
        with:
          bot_token: ${{ secrets.slack-bot-token }}
          channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
          mode: reply
          thread_ts: ${{ steps.slack.outputs.thread_ts }}
          text: |
            ${{ job.status == 'success'
              && format('✅ *Published to RubyGems* — `{0} {1}`', inputs.gem-name, github.ref_name)
              || format('🔴 *Gem release failed* — `{0}` {1}', github.repository, github.ref_name) }}
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>
