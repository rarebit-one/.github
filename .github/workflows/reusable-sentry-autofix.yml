name: Reusable Sentry Autofix

# Reusable scheduled-Sentry-sweep workflow.
#
# Each consumer schedules a daily call to this workflow with their Sentry
# project slug. The workflow:
#
#   1. Fetches the top unresolved Sentry issues for the project.
#   2. Filters out any whose short_id is already addressed by an open OR
#      recently-closed auto-fix PR (HTML-marker dedup, same pattern as the
#      post-deploy-triage autofix composite action).
#   3. Picks the highest-priority remaining candidate and hands the issue +
#      stack trace context to claude-code-action for triage.
#   4. In `mode: autofix`, if Claude classifies the issue as a high-confidence
#      regression with named suspect files, runs a second Claude pass to apply
#      a minimal fix, validates the diff (hard path blocklist + line cap),
#      pushes a signed commit, and opens a draft PR.
#   5. In `mode: triage-only`, or when the autofix gate doesn't pass (or the
#      apply produces no valid diff), files a deduplicated GitHub issue with the
#      triage summary so the finding isn't silently dropped. Target is the
#      caller repo (via GITHUB_TOKEN) or a cross-repo central tracker via
#      `followup-issue-repo` + a release-bot token.
#
# Same safety model as the post-deploy-triage autofix composite action:
# path blocklist (migrations, workflows, config/credentials*,
# config/master.key, lockfiles), configurable diff-line cap (default 50),
# signed commit via GitHub API, draft PR for human review. Never merges.
#
# See docs/reusable-workflows.md for the full input contract.

on:
  workflow_call:
    inputs:
      sentry-org:
        description: 'Sentry organization slug.'
        required: false
        type: string
        default: 'rarebit-one'
      sentry-project:
        description: 'Sentry project slug. Issues are queried from this project only.'
        required: true
        type: string
      stack:
        description: 'Stack: rails | ruby-gem | node-lib | node-app | kmp. Drives toolchain setup for the apply step.'
        required: true
        type: string
      mode:
        description: 'autofix (default) attempts a PR when triage is high-confidence; triage-only skips the apply step and only files a GitHub issue.'
        required: false
        type: string
        default: 'autofix'
      max-candidates:
        description: 'How many top Sentry issues to consider per run before dedup filtering. The triage step still picks only ONE issue per run.'
        required: false
        type: number
        default: 10
      issue-query:
        description: 'Sentry search query. Defaults to is:unresolved. Append modifiers (e.g. "is:unresolved level:error") to narrow.'
        required: false
        type: string
        default: 'is:unresolved'
      ruby-version-file:
        description: 'Path to .ruby-version file (rails, ruby-gem stacks).'
        required: false
        type: string
        default: '.ruby-version'
      ruby-version:
        description: 'Explicit ruby-version override (takes precedence over ruby-version-file).'
        required: false
        type: string
        default: ''
      node-version:
        description: 'Node version (rails, node-lib, node-app stacks).'
        required: false
        type: string
        default: 'lts/*'
      jdk-version:
        description: 'JDK version (kmp stack apply path).'
        required: false
        type: string
        default: '17'
      lint-commands:
        description: 'Multiline shell commands run post-apply as part of diff validation (e.g. rubocop, eslint, tsc). Empty means no lint gate.'
        required: false
        type: string
        default: ''
      test-commands:
        description: 'Multiline shell commands for a focused/fast test suite, run post-apply as part of diff validation. Empty means no test gate. Avoid running the full suite here — keep it under ~5 minutes.'
        required: false
        type: string
        default: ''
      diff-line-cap:
        description: 'Hard cap on total insertions+deletions in the apply step diff. Above this, the validate step rejects.'
        required: false
        type: number
        default: 50
      dedup-window-days:
        description: 'How many days back to scan closed PRs for the autofix marker when deciding whether an issue is already addressed.'
        required: false
        type: number
        default: 30
      followup-issue-repo:
        description: >-
          Where to file the GitHub-issue fallback for non-autofixable findings.
          Empty (default) files in the caller repo via GITHUB_TOKEN (requires
          Issues enabled there). Set to a cross-repo "owner/name" (e.g.
          rarebit-one/rarebit-sre, a central tracker) to file there instead —
          this requires the release-bot App (release-bot-client-id +
          release-bot-private-key) to be installed on that repo with issues:write,
          since GITHUB_TOKEN cannot write cross-repo. When the cross-repo token
          can't be minted, the would-be issue is captured in the run summary.
        required: false
        type: string
        default: ''
      timeout-minutes:
        description: 'Job-level timeout.'
        required: false
        type: number
        default: 30
      claude-timeout-minutes:
        description: 'Timeout (advisory) for each Claude action step. Composite-action steps cannot enforce this; the job timeout is the hard bound.'
        required: false
        type: number
        default: 15
      additional-allowed-tools:
        description: 'Comma-separated entries appended to the apply step claude_args --allowed-tools. Triage step always runs with Read,Grep,Glob,Write (writes only to /tmp).'
        required: false
        type: string
        default: ''
      release-bot-client-id:
        description: >-
          GitHub App Client ID (or numeric App ID) used to mint an
          installation token for pushing the auto-fix branch and opening
          the PR. Required to bypass the GITHUB_TOKEN event-suppression
          rule that prevents CI from firing on bot-opened PRs. When
          unset, the workflow falls back to GITHUB_TOKEN — the PR opens
          as a draft and CI must be triggered manually.
        required: false
        type: string
        default: ''

    secrets:
      claude-code-oauth-token:
        description: 'CLAUDE_CODE_OAUTH_TOKEN for the anthropics action.'
        required: true
      sentry-api-token:
        description: 'Read-scoped Sentry token (event:read + project:read). NOT the deploy-release write token.'
        required: true
      release-bot-private-key:
        description: >-
          GitHub App private key (.pem contents) for the bot used to
          open auto-fix PRs. When combined with release-bot-client-id,
          a short-lived installation token is minted and used instead
          of GITHUB_TOKEN so CI fires on the bot-opened PR.
        required: false

permissions: {}

env:
  # Single source of truth for the Claude model. Override org-wide via the
  # CLAUDE_MODEL Actions variable (resolved in the caller's context); the
  # literal is a safe fallback so an unset var can't yield an empty --model.
  CLAUDE_MODEL: "${{ vars.CLAUDE_MODEL || 'claude-opus-4-8' }}"

jobs:
  sentry-autofix:
    name: Sentry Autofix (${{ inputs.sentry-project }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    # contents:write for the auto-fix branch push; pull-requests:write for
    # `gh pr create --draft`; issues:write for the GitHub-issue fallback when
    # the autofix path doesn't open a PR; id-token:write so claude-code-action
    # can mint its OIDC token. The validate-before-push gate (path blocklist +
    # line cap) is the actual containment for write scope, mirroring the
    # post-deploy-triage autofix composite's design.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    env:
      # HTML-comment marker stamped into the autofix PR body and read by the
      # dedup query in the fetch step. Single source of truth so the body
      # template and the dedup grep can't drift apart.
      AUTOFIX_MARKER_PREFIX: '<!-- sentry-autofix: '

    steps:
      - name: Validate inputs
        env:
          STACK: ${{ inputs.stack }}
          MODE: ${{ inputs.mode }}
          SENTRY_ORG: ${{ inputs.sentry-org }}
          SENTRY_PROJECT: ${{ inputs.sentry-project }}
          MAX_CANDIDATES: ${{ inputs.max-candidates }}
          DIFF_LINE_CAP: ${{ inputs.diff-line-cap }}
          DEDUP_WINDOW_DAYS: ${{ inputs.dedup-window-days }}
        run: |
          set -euo pipefail
          case "$STACK" in
            rails|ruby-gem|node-lib|node-app|kmp) ;;
            *) echo "::error::Invalid stack: $STACK"; exit 1 ;;
          esac
          case "$MODE" in
            autofix|triage-only) ;;
            *) echo "::error::Invalid mode: $MODE (expected autofix or triage-only)"; exit 1 ;;
          esac
          # Slug allowlist: lower-case letters, digits, hyphens. Refuses
          # anything that could break out of a URL or shell quote.
          if ! [[ "$SENTRY_ORG" =~ ^[a-z0-9][a-z0-9-]{0,63}$ ]]; then
            echo "::error::Invalid sentry-org: $SENTRY_ORG"
            exit 1
          fi
          if ! [[ "$SENTRY_PROJECT" =~ ^[a-z0-9][a-z0-9-]{0,63}$ ]]; then
            echo "::error::Invalid sentry-project: $SENTRY_PROJECT"
            exit 1
          fi
          for n in "$MAX_CANDIDATES" "$DIFF_LINE_CAP" "$DEDUP_WINDOW_DAYS"; do
            if ! [[ "$n" =~ ^[0-9]+$ ]]; then
              echo "::error::Numeric inputs must be non-negative integers (got: $n)"
              exit 1
            fi
          done
          # EFFECTIVE_MODE mirrors MODE for every stack. KMP now has an apply
          # path (JDK + Gradle toolchain set up below when autofix), so it is
          # no longer force-downgraded to triage-only. Compose/Kotlin diffs are
          # still bounded by the same path blocklist + diff-line cap + caller
          # lint gate as the other stacks, and the PR is review-gated.
          echo "EFFECTIVE_MODE=$MODE" >> "$GITHUB_ENV"

      - name: Validate required secrets
        env:
          CLAUDE_TOKEN: ${{ secrets.claude-code-oauth-token }}
          SENTRY_TOKEN: ${{ secrets.sentry-api-token }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_TOKEN:-}" ]; then
            echo "::error::claude-code-oauth-token secret is not set"
            exit 1
          fi
          if [ -z "${SENTRY_TOKEN:-}" ]; then
            echo "::error::sentry-api-token secret is not set"
            exit 1
          fi

      - name: Determine bot token availability
        # Sets BOT_TOKEN_AVAILABLE=true only when BOTH the App Client ID
        # input AND the private-key secret are present. The mint step
        # below gates on this so a half-configured caller falls back
        # cleanly to GITHUB_TOKEN rather than failing.
        env:
          BOT_CLIENT_ID: ${{ inputs.release-bot-client-id }}
          BOT_PRIVATE_KEY: ${{ secrets.release-bot-private-key }}
        run: |
          set -euo pipefail
          if [ -n "${BOT_CLIENT_ID:-}" ] && [ -n "${BOT_PRIVATE_KEY:-}" ]; then
            echo "BOT_TOKEN_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "Release-bot credentials present — autofix PR will open as ready-for-review (CI fires)."
          else
            echo "BOT_TOKEN_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "::warning::release-bot credentials not configured for this caller — autofix PR will open as draft via GITHUB_TOKEN (CI will not fire until a human nudges the PR). Add release-bot-client-id input + release-bot-private-key secret to enable the full flow."
          fi

      - name: Mint GitHub App installation token
        # Only fires when both bot credentials are present. The token is
        # scoped to the minimum permissions needed for the auto-fix flow:
        # contents:write (push branch) + pull-requests:write (open PR).
        # When the App token is in play, events it generates (the push,
        # the PR open) DO fire downstream workflows — that's the whole
        # reason this step exists. See promote-production.yml for the
        # established org pattern.
        #
        # continue-on-error so a permission mismatch (App lacks
        # pull_requests:write), key rotation, or App uninstall produces
        # a degraded-but-functional run (falls back to GITHUB_TOKEN +
        # draft + manual-nudge note) rather than a hard job failure.
        # The post-mint resolution step below downgrades
        # BOT_TOKEN_AVAILABLE to false in that case.
        id: app_token
        if: env.BOT_TOKEN_AVAILABLE == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.release-bot-client-id }}
          private-key: ${{ secrets.release-bot-private-key }}
          permission-contents: write
          permission-pull-requests: write

      - name: Resolve bot token availability post-mint
        # The presence-check earlier set BOT_TOKEN_AVAILABLE=true based on
        # input presence; this step downgrades it to false when the mint
        # actually failed (continue-on-error left the step in a `failure`
        # outcome but didn't kill the job). Downstream steps key off
        # BOT_TOKEN_AVAILABLE for both the credential choice and the
        # draft-vs-ready PR shape; this is the single point of truth.
        if: env.BOT_TOKEN_AVAILABLE == 'true'
        env:
          MINT_OUTCOME: ${{ steps.app_token.outcome }}
          MINT_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          if [ "$MINT_OUTCOME" != "success" ] || [ -z "${MINT_TOKEN:-}" ]; then
            echo "::warning::App token mint failed (outcome=$MINT_OUTCOME). Falling back to GITHUB_TOKEN — the autofix PR will open as draft and CI will not fire until a human nudges. Most common cause: the App lacks pull_requests:write permission. Verify with: gh api /orgs/<org>/installations --jq '.installations[] | select(.app_slug == \"<bot-slug>\") | .permissions'"
            echo "BOT_TOKEN_AVAILABLE=false" >> "$GITHUB_ENV"
          else
            echo "App token mint succeeded — autofix PR will open ready-for-review."
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          # Persist the bot token (when available) as the git remote
          # credential so `git push origin` later uses it. When the mint
          # failed, steps.app_token.outputs.token is empty and the
          # action falls back to GITHUB_TOKEN.
          token: ${{ steps.app_token.outputs.token || github.token }}

      - name: Detect default branch
        id: default-branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name' 2>/dev/null || echo "main")
          echo "branch=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Detected default branch: $DEFAULT_BRANCH"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ----- stack setup (only when we may apply a fix) -----

      - name: Set up Ruby
        if: ${{ env.EFFECTIVE_MODE == 'autofix' && (inputs.stack == 'rails' || inputs.stack == 'ruby-gem') }}
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ inputs.ruby-version != '' && inputs.ruby-version || '' }}
          ruby-version-file: ${{ inputs.ruby-version == '' && inputs.ruby-version-file || '' }}
          bundler-cache: true

      - name: Set up Node.js
        if: ${{ env.EFFECTIVE_MODE == 'autofix' && (inputs.stack == 'rails' || inputs.stack == 'node-lib' || inputs.stack == 'node-app') }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install npm dependencies
        # Guarded on lockfile presence: a Rails app on Sprockets-only or any
        # Node stack that hasn't committed a lockfile would otherwise fail
        # every daily run on `npm ci`'s hard-error exit. The lint/test gates
        # downstream are no-ops without dependencies installed, so this is
        # the right place to skip cleanly rather than fail.
        if: ${{ env.EFFECTIVE_MODE == 'autofix' && (inputs.stack == 'rails' || inputs.stack == 'node-lib' || inputs.stack == 'node-app') }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::notice::No package-lock.json — skipping npm ci"
          fi

      # KMP apply path: JDK + Gradle so the caller's lint-commands (e.g.
      # `./gradlew ktlintCheck`) can run post-apply. Matches the toolchain
      # set up by reusable-weekly-maintenance.yml. setup-java/setup-gradle
      # are SHA-pinned to the same refs that workflow uses. Note: callers
      # should keep KMP gates to lint only — a full Gradle test run is too
      # slow for a daily/dispatched sweep and risks the job timeout.
      - name: Set up JDK
        if: ${{ env.EFFECTIVE_MODE == 'autofix' && inputs.stack == 'kmp' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'zulu'
          java-version: ${{ inputs.jdk-version }}

      - name: Set up Gradle
        if: ${{ env.EFFECTIVE_MODE == 'autofix' && inputs.stack == 'kmp' }}
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      # ----- fetch Sentry issues + dedup -----

      # The fetch logic is a small Node script written to RUNNER_TEMP (NOT the
      # caller's checkout) so it never appears in `git status` or `git diff`,
      # which lets the autofix validate step use plain unfiltered globs and
      # avoids any chance of accidentally committing tooling alongside the
      # fix. Bundling the script with the reusable workflow as a separate
      # `.github/scripts/` file would require checking out the .github repo
      # in the caller's job — too much ceremony for ~120 lines of code.
      - name: Fetch Sentry issues and filter dedup
        id: fetch
        env:
          SENTRY_ORG: ${{ inputs.sentry-org }}
          SENTRY_PROJECT: ${{ inputs.sentry-project }}
          SENTRY_QUERY: ${{ inputs.issue-query }}
          SENTRY_API_TOKEN: ${{ secrets.sentry-api-token }}
          MAX_CANDIDATES: ${{ inputs.max-candidates }}
          DEDUP_WINDOW_DAYS: ${{ inputs.dedup-window-days }}
          AUTOFIX_MARKER_PREFIX: ${{ env.AUTOFIX_MARKER_PREFIX }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/fetch-sentry-candidates.mjs" <<'NODE_SCRIPT_EOF'
          // Fetches top unresolved Sentry issues, filters out any whose
          // shortId is already addressed by an open or recently-closed
          // auto-fix PR (HTML-marker dedup), enriches with the latest event
          // (stack frames), and writes /tmp/sentry-issues.{json,md}.
          //
          // Soft-fail: any API hiccup logs and exits 0 with an empty array.
          // The autofix workflow treats "no candidates" as a normal outcome.

          import { appendFileSync, writeFileSync } from 'node:fs'
          import { spawnSync } from 'node:child_process'

          const env = process.env
          const need = (k) => {
            const v = env[k]
            if (!v) throw new Error(`Missing env: ${k}`)
            return v
          }

          const SENTRY_ORG = need('SENTRY_ORG')
          const SENTRY_PROJECT = need('SENTRY_PROJECT')
          const SENTRY_API_TOKEN = need('SENTRY_API_TOKEN')
          const SENTRY_QUERY = env.SENTRY_QUERY || 'is:unresolved'
          const MAX_CANDIDATES = Math.max(1, parseInt(env.MAX_CANDIDATES || '10', 10))
          const DEDUP_WINDOW_DAYS = Math.max(1, parseInt(env.DEDUP_WINDOW_DAYS || '30', 10))
          const MARKER_PREFIX = env.AUTOFIX_MARKER_PREFIX || '<!-- sentry-autofix: '
          const REPO = need('REPO')
          const FETCH_TIMEOUT_MS = 15_000

          async function sentryFetch(path) {
            const url = `https://sentry.io/api/0/${path}`
            const res = await fetch(url, {
              headers: { Authorization: `Bearer ${SENTRY_API_TOKEN}` },
              signal: AbortSignal.timeout(FETCH_TIMEOUT_MS),
            })
            if (!res.ok) {
              console.error(`Sentry ${path} -> ${res.status}: ${(await res.text()).slice(0, 200)}`)
              return null
            }
            return res.json()
          }

          function ghPrList(state, since) {
            // Plain list, then filter locally by headRefName prefix +
            // closedAt window. `gh pr list --search "head:..."` does
            // exact branch match, not prefix, which isn't what we want;
            // and there's no native prefix filter. 200 PRs covers months
            // of daily runs comfortably.
            const args = [
              'pr',
              'list',
              '--state',
              state,
              '--limit',
              '200',
              '--json',
              'number,headRefName,body,closedAt',
            ]
            const res = spawnSync('gh', args, {
              encoding: 'utf8',
              maxBuffer: 10 * 1024 * 1024,
              timeout: 30_000,
              env: { ...env, GH_REPO: REPO },
            })
            if (res.status !== 0) {
              console.error(`gh pr list (${state}) failed: ${(res.stderr || '').slice(0, 300)}`)
              return []
            }
            try {
              const all = JSON.parse(res.stdout || '[]')
              const prefixed = all.filter((pr) =>
                (pr.headRefName || '').startsWith('auto-fix/sentry-'),
              )
              if (!since) return prefixed
              const sinceMs = since.getTime()
              return prefixed.filter((pr) => {
                if (!pr.closedAt) return true
                return new Date(pr.closedAt).getTime() >= sinceMs
              })
            } catch (e) {
              console.error('Parse gh output failed:', e.message)
              return []
            }
          }

          function collectProcessedShortIds() {
            const sinceClosed = new Date(Date.now() - DEDUP_WINDOW_DAYS * 86400 * 1000)
            const open = ghPrList('open')
            const closed = ghPrList('closed', sinceClosed)
            const processed = new Set()
            for (const pr of [...open, ...closed]) {
              const body = pr.body || ''
              // Match the marker prefix + capture short_id up to ` -->`.
              const re = new RegExp(
                MARKER_PREFIX.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '([A-Z0-9-]+)\\s*-->',
                'g',
              )
              let m
              while ((m = re.exec(body)) !== null) {
                processed.add(m[1])
              }
            }
            return processed
          }

          function safeInline(s) {
            return String(s ?? '').replace(/`/g, "'")
          }

          function pickFrames(event) {
            const exception = event?.entries?.find((e) => e.type === 'exception')?.data?.values?.[0]
            if (!exception) return { type: null, value: null, frames: [] }
            const all = (exception.stacktrace?.frames || []).slice().reverse()
            const inApp = all.filter((f) => f.in_app)
            const picked = (inApp.length > 0 ? inApp : all).slice(0, 6).map((f) => ({
              filename: f.filename || null,
              lineno: f.lineno || null,
              function: f.function || null,
              contextLine: f.context_line || null,
              inApp: !!f.in_app,
            }))
            return { type: exception.type, value: exception.value, frames: picked }
          }

          function formatMd(picked) {
            const lines = ['# Sentry candidates', '']
            for (let i = 0; i < picked.length; i++) {
              const c = picked[i]
              lines.push(`## ${i + 1}. ${c.title} (${c.shortId})`)
              lines.push(`- Level: ${c.level} | Count: ${c.count} | First seen: ${c.firstSeen}`)
              lines.push(`- URL: ${c.permalink}`)
              if (c.latestEvent?.type) {
                lines.push(
                  `- Exception: \`${safeInline(c.latestEvent.type)}: ${safeInline(c.latestEvent.value)}\``,
                )
              }
              if (c.latestEvent?.frames?.length) {
                lines.push('- Top frames:')
                for (const f of c.latestEvent.frames) {
                  const loc = f.lineno ? `${f.filename}:${f.lineno}` : f.filename
                  const tag = f.inApp ? '' : ' *[external]*'
                  lines.push(
                    `  - \`${safeInline(f.function || '?')}\` (\`${safeInline(loc)}\`)${tag}`,
                  )
                  if (f.contextLine) {
                    lines.push(`    > \`${safeInline(f.contextLine.trim())}\``)
                  }
                }
              }
              lines.push('')
            }
            return lines.join('\n')
          }

          async function main() {
            console.log(`Sentry sweep: ${SENTRY_ORG}/${SENTRY_PROJECT} query="${SENTRY_QUERY}"`)
            const processed = collectProcessedShortIds()
            console.log(`Already-addressed shortIds: ${processed.size}`)

            const q = encodeURIComponent(SENTRY_QUERY)
            // sort=priority is not accepted by the project-issues endpoint
            // (returns 400 "Sort key 'priority' not supported"). sort=freq
            // surfaces the highest-volume regressions first, which fits the
            // autofix prioritisation better than recency (sort=date / new).
            const sortedBy = 'sort=freq'
            const issues = await sentryFetch(
              `projects/${SENTRY_ORG}/${SENTRY_PROJECT}/issues/?query=${q}&${sortedBy}&limit=${MAX_CANDIDATES * 2}`,
            )
            if (!Array.isArray(issues)) {
              console.error('Sentry list returned non-array — emitting empty candidates')
              writeFileSync('/tmp/sentry-issues.json', '[]')
              writeFileSync('/tmp/sentry-issues.md', '# Sentry candidates\n\n(none)\n')
              return
            }

            const undeduped = issues.filter((i) => !processed.has(i.shortId)).slice(0, MAX_CANDIDATES)
            console.log(
              `Sentry returned ${issues.length} issues; ${undeduped.length} remain after dedup`,
            )

            const picked = []
            for (const issue of undeduped) {
              const event = await sentryFetch(`issues/${issue.id}/events/latest/`)
              picked.push({
                id: issue.id,
                shortId: issue.shortId,
                title: issue.title,
                level: issue.level,
                count: issue.count,
                firstSeen: issue.firstSeen,
                lastSeen: issue.lastSeen,
                permalink: issue.permalink,
                latestEvent: event ? pickFrames(event) : null,
              })
            }

            writeFileSync('/tmp/sentry-issues.json', JSON.stringify(picked, null, 2))
            writeFileSync('/tmp/sentry-issues.md', formatMd(picked))
            console.log(`Wrote /tmp/sentry-issues.json (${picked.length} candidate(s))`)
          }

          main().catch((err) => {
            console.error('Fetch failed:', err.stack || err.message)
            writeFileSync('/tmp/sentry-issues.json', '[]')
            writeFileSync('/tmp/sentry-issues.md', '# Sentry candidates\n\n(fetch failed)\n')
            process.exit(0)
          })
          NODE_SCRIPT_EOF

          node "$RUNNER_TEMP/fetch-sentry-candidates.mjs"

          if [ ! -s /tmp/sentry-issues.json ]; then
            echo '[]' > /tmp/sentry-issues.json
          fi
          COUNT=$(jq 'length' /tmp/sentry-issues.json)
          echo "candidate_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            PICKED=$(jq -r '.[0].shortId' /tmp/sentry-issues.json)
            echo "picked_short_id=$PICKED" >> "$GITHUB_OUTPUT"
          else
            echo "picked_short_id=" >> "$GITHUB_OUTPUT"
          fi
          echo "Candidates after dedup: $COUNT"

      - name: Skip when no candidates
        if: steps.fetch.outputs.candidate_count == '0'
        env:
          PROJECT: ${{ inputs.sentry-project }}
        run: |
          {
            echo "## Sentry autofix — ${PROJECT}"
            echo ""
            echo "No unresolved Sentry issues require attention (after dedup against existing autofix PRs)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "No candidates — nothing to do."

      # ----- triage -----

      - name: Triage with Claude Code
        if: steps.fetch.outputs.candidate_count != '0'
        uses: anthropics/claude-code-action@7f37f2e37370b88fc5bd16496c0512c6e8aa2e45 # main@2.1.160 (thinking-block 400 fix; ahead of release v1.0.133 — see rarebit-ops#119)
        with:
          claude_code_oauth_token: ${{ secrets.claude-code-oauth-token }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
            --allowed-tools Read,Grep,Glob,Write
            --max-turns 20
          prompt: |
            You are a daily Sentry-sweep assistant for the `${{ inputs.sentry-project }}` project. The fetch step has identified the top-priority unresolved Sentry issue that does NOT already have an open or recently-closed auto-fix PR. Your job is to triage that issue and decide whether a minimal forward-fix is worth attempting.

            ## Inputs (use the Read tool)

            - **`/tmp/sentry-issues.json`** — JSON array of candidate Sentry issues, sorted by priority. The first element (`.[0]`) is the one to triage. Each entry has `shortId`, `title`, `level`, `count`, `firstSeen`, `permalink`, and `latestEvent` with stack frames (filename, lineno, function, contextLine, in_app).
            - **`/tmp/sentry-issues.md`** — human-readable version of the same.
            - The current checkout is the repository's default branch HEAD. Use `Read` / `Grep` on the source files referenced in the stack frames to confirm what the code currently looks like.

            ## Your task

            1. Read `/tmp/sentry-issues.json` and focus on the first entry.
            2. For the issue's top in-app stack frames, `Read` the source files at the cited line numbers. The line numbers may have drifted since the event was captured — use the surrounding function name to relocate if needed.
            3. Decide whether the issue is:
               - **likely problem**: a bug in our code at the cited frames, where a minimal fix is identifiable.
               - **minor concern**: a real issue but the fix is non-trivial, requires design judgment, or spans many files.
               - **clean**: not actionable (third-party error, expected failure, environmental, already-fixed).
            4. **Write** a human-readable triage to **`/tmp/triage.md`** using the exact format below.
            5. **Also write** a machine-readable verdict to **`/tmp/triage.json`** using the schema below. The autofix gate keys off this file.

            ## /tmp/triage.md format

            ```
            ### :robot: Sentry triage hint
            _AI-generated, not a verdict. Verify before acting._

            **Issue:** [<shortId>](<permalink>) — <title>
            **Verdict:** likely problem | minor concern | clean
            **Likely cause:** <1-2 sentences>
            **Suspect lines:** <file:line — only if confident, else "no clear in-app frame">
            **Fix suggestion:** <one sentence — what change would resolve this>
            **Confidence:** low | medium | high
            ```

            ## /tmp/triage.json schema (valid JSON only, exactly these keys)

            ```
            {
              "sentry_short_id": "<shortId from the issue>",
              "sentry_permalink": "<permalink>",
              "verdict": "likely problem" | "minor concern" | "clean",
              "confidence": "low" | "medium" | "high",
              "title": "<issue title>",
              "suspect_files": ["app/path/to/file.rb", "..."],
              "fix_summary": "<one sentence; empty when not actionable>"
            }
            ```

            - `suspect_files` MUST be repo-relative paths that exist in the current checkout. No `:LINE` suffixes. No duplicates. Empty array `[]` when you cannot pin the issue to specific files.
            - Only fill `suspect_files` when `verdict = "likely problem"`. Leave `[]` for "minor concern" or "clean".

            ## Rules

            - **"high" confidence** ONLY when you have Read the source at the top in-app stack frame and the code clearly reproduces the error path (e.g., a NoMethodError on a method that doesn't exist on the receiver, an unhandled nil deref at the exact line). Otherwise prefer "medium" or "low".
            - **"clean"** for third-party-library errors that don't originate in our code, browser/network noise (ResizeObserver loops, fetch aborts on unload), and issues whose `firstSeen` is far in the past with low recent volume (signal-dead).
            - **"minor concern"** when the fix would require touching tests, schema, configuration files, or more than ~3 source files. Those need a human.
            - Your only allowed writes are `/tmp/triage.md` and `/tmp/triage.json`. Do NOT modify source files, do NOT run shell commands, do NOT call any GitHub or Sentry API.
            - Be terse. Bullets and short sentences only.

      - name: Post triage to step summary
        if: always() && steps.fetch.outputs.candidate_count != '0'
        run: |
          set -euo pipefail
          {
            echo "## Sentry autofix — ${{ inputs.sentry-project }}"
            echo ""
            echo "- **Picked:** \`${{ steps.fetch.outputs.picked_short_id }}\`"
            echo "- **Candidates after dedup:** ${{ steps.fetch.outputs.candidate_count }}"
            echo "- **Effective mode:** \`${{ env.EFFECTIVE_MODE }}\`"
            if [ -f /tmp/triage.md ]; then
              echo ""
              echo "<details><summary>Triage</summary>"
              echo ""
              cat /tmp/triage.md
              echo ""
              echo "</details>"
            fi
            if [ -f /tmp/triage.json ]; then
              echo ""
              echo "<details><summary>Machine-readable verdict</summary>"
              echo ""
              echo '```json'
              cat /tmp/triage.json
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Reset source tree before autofix
        # Defense-in-depth against prompt injection during the triage step:
        # the triage step has Write access (needed for /tmp output) but
        # claude-code-action has no path-restricted Write flag. An injection
        # in a Sentry issue title or stack frame could redirect a write to a
        # source file. Without this reset, the autofix path's `git diff`
        # would pick up the injection-modified file as if it were part of
        # the legitimate fix. /tmp files are untouched.
        if: steps.fetch.outputs.candidate_count != '0'
        run: |
          set -euo pipefail
          if ! git diff --quiet HEAD --; then
            echo "::warning::Triage step modified tracked files — resetting before autofix"
            git diff --name-only HEAD -- | awk '{print "  - " $0}'
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard)
          if [ -n "$UNTRACKED" ]; then
            echo "::warning::Triage step created untracked files — removing before autofix"
            printf '%s\n' "$UNTRACKED" | awk '{print "  - " $0}'
          fi
          git restore --staged --worktree -- . || true
          git clean -fd

      # ----- autofix gate -----

      - name: Check autofix gate
        id: gate
        if: ${{ steps.fetch.outputs.candidate_count != '0' && env.EFFECTIVE_MODE == 'autofix' }}
        env:
          GH_TOKEN: ${{ github.token }}
          AUTOFIX_MARKER_PREFIX: ${{ env.AUTOFIX_MARKER_PREFIX }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/triage.json ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-triage-json" >> "$GITHUB_OUTPUT"
            echo "No /tmp/triage.json — skipping autofix"
            exit 0
          fi
          if ! jq empty /tmp/triage.json 2>/dev/null; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=invalid-json" >> "$GITHUB_OUTPUT"
            echo "/tmp/triage.json is not valid JSON — skipping autofix"
            exit 0
          fi

          IFS=$'\t' read -r VERDICT CONFIDENCE SUSPECT_COUNT SHORT_ID < <(
            jq -r '[.verdict // "", .confidence // "", (.suspect_files // [] | length), .sentry_short_id // ""] | @tsv' \
              /tmp/triage.json
          )

          echo "Triage: verdict=$VERDICT confidence=$CONFIDENCE suspect_files=$SUSPECT_COUNT short_id=$SHORT_ID"

          if [ "$VERDICT" != "likely problem" ] \
            || [ "$CONFIDENCE" != "high" ] \
            || [ "$SUSPECT_COUNT" -le 0 ] \
            || [ -z "$SHORT_ID" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=gate-not-passed" >> "$GITHUB_OUTPUT"
            echo "short_id=$SHORT_ID" >> "$GITHUB_OUTPUT"
            echo "Autofix gate not passed (need verdict='likely problem' + confidence=high + ≥1 suspect_files + non-empty short_id)"
            exit 0
          fi

          # The fetch step already filtered by marker against open +
          # recently-closed PRs. A second dedup check here would only
          # catch the narrow race of a human opening a PR in the seconds
          # between fetch and gate — not worth the implementation cost.
          # The push step's `git push` would still fail loudly if the
          # branch name collides, which is the real safety net.

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "short_id=$SHORT_ID" >> "$GITHUB_OUTPUT"
          echo "Autofix gate passed — preparing branch for $SHORT_ID"

      - name: Prepare autofix branch
        if: steps.gate.outputs.should_run == 'true'
        env:
          SHORT_ID: ${{ steps.gate.outputs.short_id }}
        run: |
          set -euo pipefail
          # SHORT_ID is upper-case (SIDEKICK-WEB-12). Lowercase + replace any
          # remaining non-branch-safe chars defensively, even though the
          # Sentry short_id grammar is already safe.
          BRANCH_SUFFIX=$(printf '%s' "$SHORT_ID" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')
          BRANCH="auto-fix/sentry-${BRANCH_SUFFIX}"
          git checkout -B "$BRANCH"
          echo "AUTOFIX_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Apply auto-fix with Claude Code
        if: steps.gate.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@7f37f2e37370b88fc5bd16496c0512c6e8aa2e45 # main@2.1.160 (thinking-block 400 fix; ahead of release v1.0.133 — see rarebit-ops#119)
        with:
          claude_code_oauth_token: ${{ secrets.claude-code-oauth-token }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
            --allowed-tools Read,Edit,Grep,Glob${{ inputs.additional-allowed-tools != '' && format(',{0}', inputs.additional-allowed-tools) || '' }}
            --max-turns 15
          prompt: |
            A Sentry issue in `${{ inputs.sentry-project }}` was triaged as a high-confidence regression. Apply the minimal forward-fix.

            ## Inputs (use the Read tool)

            - **`/tmp/triage.json`** — your prior verdict. `suspect_files` names the files to start from. `fix_summary` describes the intended change. `sentry_short_id` and `sentry_permalink` identify the issue.
            - **`/tmp/triage.md`** — the human-readable triage you wrote.
            - **`/tmp/sentry-issues.json`** / **`/tmp/sentry-issues.md`** — the full Sentry context (stack trace, latest event, in-app frames). The picked issue is `.[0]`.
            - The current checkout is the repository's default branch HEAD. The output is a **draft PR** — a human reviews everything before it lands.

            ## Your task

            Apply the smallest change that would resolve the Sentry issue.

            - **Start with the files in `suspect_files`.** Expand to other files only when the fix genuinely needs them. The draft PR is the human-review gate; don't artificially constrain yourself, but don't drift either.
            - **Hard limit: ${{ inputs.diff-line-cap }} changed lines total** (insertions + deletions across all files). Anything bigger is too risky to land without a human writing it; if the minimal fix exceeds this, do nothing.
            - **Off-limits regardless of suspect_files**: `db/migrate/`, `.github/`, `config/credentials*` (encrypted secrets), `config/master.key`, lockfiles (`Gemfile.lock`, `package-lock.json`, `yarn.lock`, `pnpm-lock.yaml`). A downstream validation step rejects any diff touching these. The rest of `config/` is application code and is fixable.
            - **No refactors, no doc updates.** Tests are okay only when the failure is a test gap that lets the bug land — the fix is to update the assertion.
            - **You can only modify existing files** — the `Write` tool is not available. If the fix genuinely needs a new file, do nothing and let a human handle it.
            - **Higher bar than a CI-failure fix**: this code is already in production and the error has been recurring. Stack frames in `/tmp/sentry-issues.json` may point to edge cases (rare inputs, race conditions, third-party flakes) that aren't true regressions even when they look like one. If the cause is anything other than a clear bug in the source you can Read, do nothing.
            - If the fix isn't obvious from the available context — if you're guessing — do nothing. The triage summary will still be reported in the run summary; that's enough value on its own.

            Use `Read`, `Grep`, `Edit`. Do NOT call shell commands. Do NOT modify `/tmp/*` files.

            When you're done (or have decided not to act), simply stop. The next workflow step inspects `git diff` directly.

      - name: Validate auto-fix diff
        id: validate
        if: steps.gate.outputs.should_run == 'true'
        env:
          DIFF_LINE_CAP: ${{ inputs.diff-line-cap }}
        run: |
          set -euo pipefail

          CHANGED_TRACKED=$(git diff --name-only)
          CHANGED_UNTRACKED=$(git ls-files --others --exclude-standard)
          CHANGED=$(printf '%s\n%s\n' "$CHANGED_TRACKED" "$CHANGED_UNTRACKED" \
            | grep -v '^$' | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-diff" >> "$GITHUB_OUTPUT"
            echo "No changes — Claude declined to apply a fix."
            exit 0
          fi

          # Hard-blocked paths: never auto-fix migrations, workflow files,
          # config secrets, or lockfiles. Mirrors the post-deploy-triage
          # autofix composite blocklist.
          BLOCKED=$(printf '%s\n' "$CHANGED" \
            | grep -E '^(db/migrate/|\.github/|config/credentials|config/master\.key|Gemfile\.lock|package-lock\.json|yarn\.lock|pnpm-lock\.yaml)' \
            || true)
          if [ -n "$BLOCKED" ]; then
            echo "::error::Auto-fix touched hard-blocked paths:"
            echo "$BLOCKED" | awk '{print "  - " $0}'
            echo "applied=false" >> "$GITHUB_OUTPUT"
            echo "reason=blocked-path" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          DIFF_LINES=$(git diff --numstat \
            | awk '{a += ($1 == "-" ? 0 : $1); d += ($2 == "-" ? 0 : $2)} END {print a + d + 0}')
          NEW_LINES=0
          if [ -n "$CHANGED_UNTRACKED" ]; then
            NEW_LINES=$(printf '%s\n' "$CHANGED_UNTRACKED" \
              | xargs -d '\n' wc -l 2>/dev/null \
              | awk '{n = $1} END {print n + 0}')
          fi
          TOTAL=$((DIFF_LINES + NEW_LINES))
          if [ "$TOTAL" -gt "$DIFF_LINE_CAP" ]; then
            echo "::error::Auto-fix diff too large ($TOTAL lines; cap is $DIFF_LINE_CAP). Refusing to push."
            echo "applied=false" >> "$GITHUB_OUTPUT"
            echo "reason=diff-too-large" >> "$GITHUB_OUTPUT"
            echo "diff_lines=$TOTAL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "applied=true" >> "$GITHUB_OUTPUT"
          echo "diff_lines=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Validated: ${TOTAL} lines across $(echo "$CHANGED" | wc -l | tr -d ' ') file(s)"
          echo "$CHANGED" | awk '{print "  - " $0}'

      - name: Run lint checks on diff
        # Optional gate — only when the caller passed lint-commands. Each
        # line is a command; all must exit 0 or the autofix is rejected
        # before push. Mirrors the weekly-maintenance verification model.
        if: steps.gate.outputs.should_run == 'true' && steps.validate.outputs.applied == 'true' && inputs.lint-commands != ''
        env:
          LINT_COMMANDS: ${{ inputs.lint-commands }}
        run: |
          set -euo pipefail
          while IFS= read -r cmd; do
            [ -z "$cmd" ] && continue
            echo "::group::lint: $cmd"
            bash -c "$cmd"
            echo "::endgroup::"
          done <<< "$LINT_COMMANDS"

      - name: Run focused test commands
        if: steps.gate.outputs.should_run == 'true' && steps.validate.outputs.applied == 'true' && inputs.test-commands != ''
        env:
          TEST_COMMANDS: ${{ inputs.test-commands }}
        run: |
          set -euo pipefail
          while IFS= read -r cmd; do
            [ -z "$cmd" ] && continue
            echo "::group::test: $cmd"
            bash -c "$cmd"
            echo "::endgroup::"
          done <<< "$TEST_COMMANDS"

      - name: Push auto-fix branch and open PR
        id: push
        if: steps.gate.outputs.should_run == 'true' && steps.validate.outputs.applied == 'true'
        env:
          # Use the App-installation token when available so the push +
          # PR-open events fire downstream CI workflows. GitHub
          # deliberately suppresses workflow runs for events caused by
          # GITHUB_TOKEN, which is why a vanilla bot-opened PR sits with
          # no checks. Falling back to GITHUB_TOKEN is intentional: the
          # workflow still works, but the resulting PR opens as a draft
          # and a human must close/reopen (or push) to trigger CI.
          GH_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
          SHORT_ID: ${{ steps.gate.outputs.short_id }}
          DEFAULT_BRANCH: ${{ steps.default-branch.outputs.branch }}
          AUTOFIX_MARKER_PREFIX: ${{ env.AUTOFIX_MARKER_PREFIX }}
          BOT_TOKEN_AVAILABLE: ${{ env.BOT_TOKEN_AVAILABLE }}
        run: |
          set -euo pipefail

          TITLE=$(jq -r '.title // ""' /tmp/triage.json)
          TITLE=${TITLE:0:100}  # char-based truncation (head -c counts bytes and can split a multibyte char)
          PERMALINK=$(jq -r '.sentry_permalink // ""' /tmp/triage.json)
          FIX_SUMMARY=$(jq -r '.fix_summary // ""' /tmp/triage.json)
          MARKER="${AUTOFIX_MARKER_PREFIX}${SHORT_ID} -->"

          COMMIT_MESSAGE="Auto-fix: Sentry ${SHORT_ID}

          Generated by the daily Sentry autofix sweep. Sentry classified this
          issue as a high-confidence regression with a minimal forward-fix
          identifiable in the source. Validated against a path blocklist
          (migrations / workflows / config / lockfiles) and a ${{ inputs.diff-line-cap }}-line diff cap,
          plus the caller's lint/test commands.

          Sentry issue: ${SHORT_ID}
          Sentry URL: ${PERMALINK}

          🤖 Generated by Claude Code via reusable-sentry-autofix.yml"

          # PR body wording depends on whether the bot token is in play:
          # when it is, CI fires immediately and the reviewer checklist
          # doesn't need to mention the "mark ready" workaround.
          if [ "$BOT_TOKEN_AVAILABLE" = "true" ]; then
            READY_LINE=""
          else
            READY_LINE="
          - [ ] Mark \"Ready for review\" once verified — CI does not run on draft PRs created by \`GITHUB_TOKEN\`. The repo's release-bot App is not configured (see [reusable-sentry-autofix.yml docs](https://github.com/rarebit-one/.github/blob/main/docs/reusable-workflows.md))."
          fi

          PR_BODY="## Auto-fix from Sentry sweep

          A daily sweep of unresolved Sentry issues in \`${{ inputs.sentry-project }}\` triaged this issue as a **likely problem** with **high confidence**. Claude applied a minimal forward-fix and this PR is opened for human review.

          - **Sentry issue:** [${SHORT_ID}](${PERMALINK}) — ${TITLE}
          - **Fix summary:** ${FIX_SUMMARY}
          - **Diff size:** ${{ steps.validate.outputs.diff_lines }} lines
          - **Triage run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Reviewer checklist

          - [ ] Diff matches the triage summary
          - [ ] The Sentry issue is genuinely caused by the code on the default branch (not an old release / rolled-back deploy)
          - [ ] Local tests pass
          - [ ] No unintended scope creep${READY_LINE}

          🤖 Generated by Claude Code via \`reusable-sentry-autofix.yml\`

          ${MARKER}"

          git add -A
          git commit -m "$COMMIT_MESSAGE"

          # Push the (locally-unsigned) commit so the remote ref exists;
          # then PATCH the ref to point at a server-signed commit created
          # via the API. Same pattern as the post-deploy-triage autofix
          # composite. `auto-fix/*` is exempted from the "Require signed
          # commits" branch protection so the unsigned intermediate is
          # acceptable. The remote credential helper picked up the bot
          # token from the checkout step's `token:` input when available.
          git push origin "$AUTOFIX_BRANCH"

          TREE=$(git rev-parse HEAD^{tree})
          PARENT=$(git rev-parse HEAD^)
          SIGNED=$(gh api "repos/$GITHUB_REPOSITORY/git/commits" \
            --method POST \
            -f message="$COMMIT_MESSAGE" \
            -f tree="$TREE" \
            -f "parents[]=$PARENT" \
            --jq '.sha')
          [ -z "$SIGNED" ] && { echo "ERROR: failed to create signed commit via API" >&2; exit 1; }

          gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$AUTOFIX_BRANCH" \
            --method PATCH \
            -f sha="$SIGNED" \
            -F force=true

          UPDATED=$(gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$AUTOFIX_BRANCH" --jq '.object.sha')
          [ "$UPDATED" != "$SIGNED" ] && { echo "ERROR: branch ref did not advance to signed SHA" >&2; exit 1; }

          # Draft only when falling back to GITHUB_TOKEN — CI won't run
          # on it either way, so the draft state at least signals to the
          # human reviewer that a manual nudge is needed. With the App
          # token, CI fires and the PR opens ready-for-review.
          if [ "$BOT_TOKEN_AVAILABLE" = "true" ]; then
            DRAFT_FLAG=""
          else
            DRAFT_FLAG="--draft"
          fi

          URL=$(gh pr create \
            $DRAFT_FLAG \
            --title "Auto-fix: Sentry ${SHORT_ID}" \
            --body "$PR_BODY" \
            --base "$DEFAULT_BRANCH" \
            --head "$AUTOFIX_BRANCH")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Opened PR ($([ "$BOT_TOKEN_AVAILABLE" = "true" ] && echo "ready-for-review" || echo "draft")): $URL"

      # ----- GitHub-issue fallback (triage-only, autofix-skipped, or autofix-failed) -----

      # When the autofix path did NOT open a PR — triage-only mode, the gate
      # didn't pass (low confidence / no suspect files / not actionable), or the
      # apply produced no valid diff — file a deduplicated GitHub issue so the
      # finding isn't silently dropped. Engine-agnostic (plain `gh`, no agent):
      # the triage verdict in /tmp/triage.json is all it needs.
      #
      # Target is `followup-issue-repo` when set (a central tracker, written via
      # a cross-repo release-bot token minted below), else the caller repo (via
      # GITHUB_TOKEN). Either way it degrades gracefully — when the issue can't
      # be created (Issues disabled, no cross-repo token), the would-be body is
      # captured in the run summary, mirroring sre-brain/health-sweep.yml.

      - name: Resolve follow-up tracker repo name
        # create-github-app-token's `repositories:` wants the bare repo NAME
        # (owner is set separately) — strip the "owner/" prefix here since
        # Actions expressions can't split strings.
        id: followup_repo
        if: ${{ inputs.followup-issue-repo != '' }}
        env:
          FOLLOWUP_REPO: ${{ inputs.followup-issue-repo }}
        run: echo "name=${FOLLOWUP_REPO##*/}" >> "$GITHUB_OUTPUT"

      - name: Mint follow-up issue token (cross-repo tracker)
        # Only when filing into a DIFFERENT repo than the caller and the bot
        # creds are present. GITHUB_TOKEN can't write cross-repo, so a central
        # tracker needs an App token scoped to it with issues:write. Separate
        # from the PR-push mint (which is contents+pull-requests only) so this
        # extra permission requirement never affects the PR flow.
        # continue-on-error: a missing/under-scoped App degrades to the
        # step-summary capture below rather than failing the run.
        # NOTE: the mint is scoped to the CALLER's owner (github.repository_owner),
        # so `followup-issue-repo` must live under the caller's org — a tracker
        # in another org silently degrades to the step-summary capture.
        id: followup_token
        if: >-
          steps.fetch.outputs.candidate_count != '0' &&
          inputs.followup-issue-repo != '' &&
          inputs.release-bot-client-id != '' &&
          (env.EFFECTIVE_MODE == 'triage-only' ||
           steps.gate.outputs.should_run != 'true' ||
           steps.push.outputs.url == '')
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.release-bot-client-id }}
          private-key: ${{ secrets.release-bot-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.followup_repo.outputs.name }}
          permission-issues: write

      - name: Open follow-up GitHub issue
        if: >-
          steps.fetch.outputs.candidate_count != '0' &&
          (env.EFFECTIVE_MODE == 'triage-only' ||
           steps.gate.outputs.should_run != 'true' ||
           steps.push.outputs.url == '')
        env:
          # In-repo (GITHUB_TOKEN) when no tracker is configured; otherwise the
          # cross-repo App token (empty if the mint failed → handled below).
          FOLLOWUP_REPO: ${{ inputs.followup-issue-repo }}
          TRACKER_TOKEN: ${{ steps.followup_token.outputs.token }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
          CALLER_REPO: ${{ github.repository }}
          PROJECT: ${{ inputs.sentry-project }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/triage.json ] || ! jq empty /tmp/triage.json 2>/dev/null; then
            echo "No valid /tmp/triage.json — nothing to file."
            exit 0
          fi

          IFS=$'\t' read -r SHORT_ID VERDICT CONFIDENCE < <(
            jq -r '[.sentry_short_id // "", .verdict // "", .confidence // ""] | @tsv' /tmp/triage.json
          )
          TITLE=$(jq -r '.title // ""' /tmp/triage.json)
          TITLE=${TITLE:0:100}  # char-based truncation (head -c counts bytes and can split a multibyte char)
          PERMALINK=$(jq -r '.sentry_permalink // ""' /tmp/triage.json)
          FIX_SUMMARY=$(jq -r '.fix_summary // ""' /tmp/triage.json)

          # "clean" verdicts are non-actionable by design — don't file noise.
          # A missing short_id means we can't dedup, so also skip.
          if [ "$VERDICT" = "clean" ] || [ -z "$SHORT_ID" ]; then
            echo "Verdict='$VERDICT' short_id='$SHORT_ID' — not filing an issue."
            exit 0
          fi

          # Resolve target repo + token. A configured tracker needs the minted
          # cross-repo token; if that mint failed, fall through to capture.
          if [ -n "$FOLLOWUP_REPO" ]; then
            TARGET_REPO="$FOLLOWUP_REPO"
            GH_TOKEN="$TRACKER_TOKEN"
          else
            TARGET_REPO="$CALLER_REPO"
            GH_TOKEN="$GITHUB_TOKEN_FALLBACK"
          fi
          export GH_TOKEN

          ISSUE_TITLE="Sentry: ${SHORT_ID} — ${TITLE}"
          # Stamped into the body AND matched by the dedup below — keep in sync.
          MARKER="<!-- sentry-autofix-followup: ${SHORT_ID} -->"
          BODY_FILE="${RUNNER_TEMP:-/tmp}/followup-issue.md"
          {
            echo "A Sentry sweep of \`${PROJECT}\` triaged this issue but the autofix path did not open a PR (triage-only, gate not passed, or no valid minimal fix). Filing for human pick-up."
            echo ""
            echo "- **Project:** \`${PROJECT}\` (${CALLER_REPO})"
            echo "- **Sentry issue:** [${SHORT_ID}](${PERMALINK})"
            echo "- **Verdict:** ${VERDICT} (confidence: ${CONFIDENCE})"
            if [ -n "$FIX_SUMMARY" ]; then echo "- **Suggested direction:** ${FIX_SUMMARY}"; fi
            echo "- **Sweep run:** ${RUN_URL}"
            echo ""
            if [ -s /tmp/triage.md ]; then
              echo "<details><summary>Triage detail</summary>"
              echo ""
              cat /tmp/triage.md
              echo ""
              echo "</details>"
              echo ""
            fi
            echo "$MARKER"
          } > "$BODY_FILE"

          # If the target is a tracker but we have no token, the mint failed —
          # capture and stop (can't write cross-repo with GITHUB_TOKEN).
          if [ -n "$FOLLOWUP_REPO" ] && [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::Could not mint a cross-repo token for ${TARGET_REPO} (release-bot App likely lacks issues:write there). Capturing the would-be issue in the run summary."
            { echo "## Sentry follow-up (no cross-repo token for ${TARGET_REPO})"; echo ""; echo "**Would-be title:** ${ISSUE_TITLE}"; echo ""; cat "$BODY_FILE"; } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Dedup: skip if an open issue in the target already tracks this
          # shortId. Match on the body marker (symmetric with the PR-path
          # dedup) via a label-filtered list — unlike `--search`, the plain
          # issues API isn't behind the eventually-consistent search index,
          # so two dispatches in quick succession can't both see "no existing
          # issue" and double-file.
          EXISTING=$(gh issue list --repo "$TARGET_REPO" --state open \
            --label sentry-autofix --limit 200 --json number,body 2>/dev/null \
            | jq -r --arg marker "$MARKER" \
                '[.[] | select(.body // "" | contains($marker))][0].number // empty' || true)
          if [ -n "$EXISTING" ]; then
            echo "Open issue #${EXISTING} in ${TARGET_REPO} already tracks ${SHORT_ID} — skipping."
            exit 0
          fi

          # Ensure the label exists (idempotent). Best-effort: a failure here
          # (Issues off / perms) shouldn't abort — the create below handles it.
          gh label create sentry-autofix --repo "$TARGET_REPO" --color FBCA04 \
            --description "Filed by the Sentry autofix sweep" >/dev/null 2>&1 || true

          if URL=$(gh issue create --repo "$TARGET_REPO" \
            --title "$ISSUE_TITLE" \
            --label sentry-autofix \
            --body-file "$BODY_FILE" 2>"${RUNNER_TEMP:-/tmp}/issue-err.txt"); then
            echo "Filed follow-up issue: $URL"
            echo "FOLLOWUP_ISSUE_URL=$URL" >> "$GITHUB_ENV"
          else
            echo "::warning::Could not create a GitHub issue in ${TARGET_REPO} (Issues may be disabled, or the token lacks issues:write). Capturing the would-be issue in the run summary."
            cat "${RUNNER_TEMP:-/tmp}/issue-err.txt" || true
            {
              echo "## Sentry follow-up (issue creation failed in ${TARGET_REPO})"
              echo ""
              echo "**Would-be title:** ${ISSUE_TITLE}"
              echo ""
              cat "$BODY_FILE"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # ----- summary -----

      - name: Final summary
        if: always()
        env:
          PROJECT: ${{ inputs.sentry-project }}
          CANDIDATE_COUNT: ${{ steps.fetch.outputs.candidate_count }}
          PICKED: ${{ steps.fetch.outputs.picked_short_id }}
          GATE: ${{ steps.gate.outputs.should_run }}
          GATE_REASON: ${{ steps.gate.outputs.reason }}
          APPLIED: ${{ steps.validate.outputs.applied }}
          PR_URL: ${{ steps.push.outputs.url }}
          DIFF_LINES: ${{ steps.validate.outputs.diff_lines }}
          FOLLOWUP_ISSUE_URL: ${{ env.FOLLOWUP_ISSUE_URL }}
        run: |
          set -euo pipefail
          {
            echo ""
            echo "### Outcome"
            echo ""
            echo "- **Candidates:** ${CANDIDATE_COUNT:-0}"
            echo "- **Picked:** \`${PICKED:-none}\`"
            echo "- **Autofix gate:** ${GATE:-skipped}${GATE_REASON:+ (${GATE_REASON})}"
            if [ "${APPLIED:-}" = "true" ]; then
              echo "- **Autofix applied:** yes (${DIFF_LINES} lines)"
            elif [ -n "${APPLIED:-}" ]; then
              echo "- **Autofix applied:** no"
            fi
            if [ -n "${PR_URL:-}" ]; then
              echo "- **PR:** ${PR_URL}"
            fi
            if [ -n "${FOLLOWUP_ISSUE_URL:-}" ]; then
              echo "- **Follow-up issue:** ${FOLLOWUP_ISSUE_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
