name: Pin Gate

# Self-caller that runs the reusable actions-pinning gate on this repo's own PRs.
# This is the reference wiring every consumer repo copies (pointing `uses:` at
# `rarebit-one/.github/.github/workflows/pin-check.yml@main` instead of `./`).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: pin-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pin-check:
    permissions:
      contents: read
    uses: ./.github/workflows/pin-check.yml
