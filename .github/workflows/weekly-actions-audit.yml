name: Weekly Actions Audit

# Org-level GitHub Actions waste audit — the deterministic SENSOR of the CI
# self-healing loop (DEC-OCTO-0003 / sre-brain#109).
#
# NOT a reusable per-repo workflow — this is a single org-level sweep that lives
# in rarebit-one/.github, audits Actions *usage* across the whole org (INCLUDING
# this repo's own reusable workflows), and files ONE deduped `ci-audit` issue per
# finding in the central rarebit-one/rarebit-sre tracker.
#
# ISSUE-ONLY (sensor): this workflow opens NO PRs. Issue-worthy findings —
# including the missing-`concurrency:` pattern that used to be an inline auto-fix
# PR here — become `ci-audit` issues; low-severity findings go to the digest only.
# The fix moved to the ACTUATOR: sre-brain's ci-fix-sweep + ci-fix-engine read
# these issues, propose a guarded workflow fix, and open a ready-for-review PR that
# links back. The audit's own reconcile pass auto-closes an issue once its finding
# clears (scoped to scanned repos) — the tracker self-heals, no manual close.
# Each `ci-audit` issue carries the TARGET REPO + offending workflow file in a
# machine-parseable `ci-target` block (see audit/open_issues.py) so the engine
# knows exactly what to fix. This keeps the sensor deterministic (no LLM/OAuth
# budget) and every fix an auditable work unit. Nothing here merges (rule #7).
#
# Kept from the prior design: the deterministic audit.py/recommendations.py scan,
# the actions/cache week-over-week deltas, marker-based issue dedup, and the Slack
# digest. SHA-pinned third-party actions throughout.

on:
  schedule:
    # 02:00 SGT Monday — the issue-creating-SENSOR slot (DEC-OCTO-0004 re-time),
    # ahead of the 07:00 SGT PR-creating actuators so the freshest ci-audit issues
    # are present when ci-fix-sweep runs. 02:00 SGT = 18:00 UTC the PREVIOUS day,
    # so Monday-SGT maps to Sunday UTC → DOW 0 (the date-line day-shift), NOT 1.
    - cron: '0 18 * * 0'   # Mon 02:00 SGT = Sun 18:00 UTC (DOW 0)
  workflow_dispatch:
    inputs:
      scope:
        description: 'Audit scope passed to audit.py: auto | core5 | all.'
        required: false
        type: choice
        options: [auto, core5, all]
        default: auto
      window:
        description: 'Audit window in days.'
        required: false
        type: string
        default: '7'
      dry-run:
        description: 'When true, run the audit + partition and post the digest, but do NOT open ci-audit issues. Use for ad-hoc validation.'
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: weekly-actions-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Actions audit (issue-only sensor)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read   # job token only reads this repo; cross-repo issue writes use the minted App token

    steps:
      - name: Validate inputs
        env:
          SCOPE: ${{ inputs.scope || 'auto' }}
          WINDOW: ${{ inputs.window || '7' }}
        run: |
          set -euo pipefail
          case "$SCOPE" in
            auto|core5|all) ;;
            *) echo "::error::Invalid scope: $SCOPE"; exit 1 ;;
          esac
          if ! [[ "$WINDOW" =~ ^[0-9]+$ ]]; then
            echo "::error::window must be a positive integer (got: $WINDOW)"; exit 1
          fi

      - name: Validate required secrets
        env:
          APP_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          APP_ID: ${{ vars.RELEASE_BOT_CLIENT_ID }}
        run: |
          set -euo pipefail
          # Cross-repo App credentials (sidekick-release-bot) are required to read
          # org-wide Actions usage and to file ci-audit issues in the sre-brain
          # tracker. No engine creds here — this sensor opens no PRs and runs no LLM.
          # Use `[ -n ] || { … }`, not `[ -z ] && { … }`: under `set -e` a `[ -z ]`
          # test that PASSES (secret present) returns 1 as the branch's last command
          # and would abort the step even though every secret is set.
          [ -n "${APP_ID:-}" ] || { echo "::error::vars.RELEASE_BOT_CLIENT_ID is not set"; exit 1; }
          [ -n "${APP_PRIVATE_KEY:-}" ] || { echo "::error::secrets.RELEASE_BOT_PRIVATE_KEY is not set"; exit 1; }
          echo "required secrets present"

      - name: Checkout .github (audit scripts + workflow)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      # Mint a cross-repo installation token for the org-installed
      # sidekick-release-bot App. Reuses the SAME app-id/private-key names that
      # octo-brain + the team-brains use. owner: sidekick-labs with no
      # `repositories:` => all repos the App is installed on (the org-level sweep
      # needs org-wide reach to READ each repo's Actions usage + workflow files).
      # ISSUE-ONLY sensor: contents:read (not write) + issues:write only — no
      # pull-requests scope, because the fix (and its PR) lives in the ci-fix engine.
      - name: Mint sidekick-release-bot installation token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: rarebit-one
          permission-contents: read   # read workflow files for the concurrency pre-check
          permission-issues: write    # open/refresh the ci-audit issues in the sre-brain tracker
          permission-actions: read    # read org-wide Actions runs/usage (the audit)
          permission-metadata: read

      # ----- week-over-week deltas via cache (mirror weekly-maintenance census cache) -----

      - name: Restore previous audit snapshot
        id: audit-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .audit-cache/audit.previous.json
          key: weekly-actions-audit-${{ github.repository_id }}-${{ github.run_id }}
          restore-keys: |
            weekly-actions-audit-${{ github.repository_id }}-

      - name: Run audit collector
        id: audit
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          AUDIT_ORG: rarebit-one
          AUDIT_TRACKER_REPO: rarebit-one/rarebit-sre
          SCOPE: ${{ inputs.scope || 'auto' }}
          WINDOW: ${{ inputs.window || '7' }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/tmp/audit" .audit-cache
          PREV_ARG=()
          if [ -f .audit-cache/audit.previous.json ]; then
            PREV_ARG=(--prev .audit-cache/audit.previous.json)
          fi
          python3 audit/audit.py --scope "$SCOPE" --window "$WINDOW" \
            --output-dir "$GITHUB_WORKSPACE/tmp/audit" "${PREV_ARG[@]}"
          # Refresh cached "previous" snapshot for next run's WoW delta.
          cp "$GITHUB_WORKSPACE/tmp/audit/audit.json" .audit-cache/audit.previous.json
          # Surface the human-readable report in the run summary.
          cat "$GITHUB_WORKSPACE/tmp/audit/report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Partition recommendations
        id: recs
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          AUDIT_ORG: rarebit-one
          AUDIT_TRACKER_REPO: rarebit-one/rarebit-sre
        run: |
          set -euo pipefail
          python3 audit/recommendations.py "$GITHUB_WORKSPACE/tmp/audit/audit.json" \
            --output "$GITHUB_WORKSPACE/tmp/audit/recommendations.json"
          RECS="$GITHUB_WORKSPACE/tmp/audit/recommendations.json"
          JUDG_COUNT=$(jq '.judgment | length' "$RECS")
          DIGEST_COUNT=$(jq '.digest | length' "$RECS")
          FP_COUNT=$(jq '.false_positives | length' "$RECS")
          {
            echo "judgment_count=$JUDG_COUNT"
            echo "digest_count=$DIGEST_COUNT"
            echo "fp_count=$FP_COUNT"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Findings partition"
            echo "- Issue-worthy (-> ci-audit issues): $JUDG_COUNT"
            echo "- Digest-only (informational, no issue): $DIGEST_COUNT"
            echo "- False positives (already fixed): $FP_COUNT"
            if [ "$DIGEST_COUNT" -gt 0 ]; then
              echo ""
              echo "### Digest (informational — not filed as issues)"
              jq -r '.digest[] | "- **\(.repo)/\(.workflow_name)**: \(.category) — \(.note)"' "$RECS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ----- issue sink + reconcile: open issue-worthy findings, close cleared ones -----
      #
      # ISSUE-WORTHY findings (concurrency + over-threshold severe — see
      # recommendations.py) become deduped `ci-audit` issues in the CENTRAL
      # rarebit-one/rarebit-sre tracker (the infra/CI-health brain — NOT the audited
      # source repos, NOT committed markdown, NOT Linear). Each body carries the
      # machine-parseable `ci-target` block + a hidden `<!-- actions-audit:<rec_id> -->`
      # dedup marker; open_issues.py skips if an open issue already bears the marker.
      # Low-severity findings go to the digest, never an issue. AFTER creating,
      # open_issues.py RECONCILES — closing marker-bearing issues whose finding
      # cleared this run (scoped to scanned repos so a partial scan never
      # mass-closes). Runs on every non-dry-run, INCLUDING zero-new-finding runs,
      # because that's exactly when closes happen. Uses the minted release-bot token
      # (issues:write org-wide).

      - name: Open + reconcile ci-audit issues
        id: issues
        if: ${{ inputs.dry-run != true }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          AUDIT_ORG: rarebit-one
          AUDIT_TRACKER_REPO: rarebit-one/rarebit-sre
          RECS_FILE: ${{ github.workspace }}/tmp/audit/recommendations.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          LOG=$(mktemp)
          ISSUE_COUNT=$(python3 audit/open_issues.py "$RECS_FILE" --run-url "$RUN_URL" 2>"$LOG")
          cat "$LOG" >&2
          CLOSED_COUNT=$(grep -oE 'closed=[0-9]+' "$LOG" | tail -1 | cut -d= -f2 || true)
          [ -z "$CLOSED_COUNT" ] && CLOSED_COUNT=0
          {
            echo "issue_count=$ISSUE_COUNT"
            echo "closed_count=$CLOSED_COUNT"
          } >> "$GITHUB_OUTPUT"
          echo "Opened $ISSUE_COUNT new ci-audit issue(s); reconcile closed $CLOSED_COUNT cleared (existing kept)." >> "$GITHUB_STEP_SUMMARY"

      # ----- artifacts -----

      - name: Upload audit artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: weekly-actions-audit-${{ github.run_id }}
          path: tmp/audit/
          if-no-files-found: ignore
          retention-days: 90

      # ----- Slack digest to #octo-internal (engineering-internal, NOT #octo) -----

      - name: Post Slack digest
        if: ${{ always() }}
        env:
          # Bot-token path (chat.postMessage) — reuses the org SLACK_BOT_TOKEN the
          # brains post with, rather than a per-channel Incoming Webhook. Requires
          # the "Sidekick Brains" bot invited to the (private) #octo-internal and
          # .github added to SLACK_BOT_TOKEN's selected-repo scope.
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          OCTO_INTERNAL_CHANNEL: C0BBB2NRNN6   # #observability
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JUDG_COUNT: ${{ steps.recs.outputs.judgment_count }}
          DIGEST_COUNT: ${{ steps.recs.outputs.digest_count }}
          FP_COUNT: ${{ steps.recs.outputs.fp_count }}
          ISSUE_COUNT: ${{ steps.issues.outputs.issue_count }}
          CLOSED_COUNT: ${{ steps.issues.outputs.closed_count }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_BOT_TOKEN:-}" ] || [ -z "${OCTO_INTERNAL_CHANNEL:-}" ]; then
            echo "::warning::SLACK_BOT_TOKEN or OCTO_INTERNAL_CHANNEL not set — skipping Slack digest (run summary still has the report)."
            exit 0
          fi
          MODE="live"
          [ "${DRY_RUN:-false}" = "true" ] && MODE="DRY-RUN (no issues)"

          TEXT=$(printf ':broom: *Weekly Actions Audit* (sensor, %s)\n*Run:* %s\nIssue-worthy: %s · Digest-only: %s · False positives skipped: %s\n*ci-audit issues opened:* %s · *reconcile closed:* %s\n\nFixes are opened by the `ci-fix` actuator in sre-brain (sre-brain#109); low-severity findings stay in this digest, not the tracker.' \
            "$MODE" "$RUN_URL" "${JUDG_COUNT:-0}" "${DIGEST_COUNT:-0}" "${FP_COUNT:-0}" "${ISSUE_COUNT:-0}" "${CLOSED_COUNT:-0}")

          # chat.postMessage returns HTTP 200 even on logical errors (e.g.
          # not_in_channel) — so don't rely on curl -f; parse `.ok`.
          RESP=$(curl -fsS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d "$(jq -n --arg c "$OCTO_INTERNAL_CHANNEL" --arg t "$TEXT" \
                  '{channel:$c, text:$t, unfurl_links:false, unfurl_media:false}')") \
            || { echo "::warning::Slack request failed (network/HTTP)."; exit 0; }
          if [ "$(printf '%s' "$RESP" | jq -r '.ok')" = "true" ]; then
            echo "Posted Slack digest to $OCTO_INTERNAL_CHANNEL."
          else
            echo "::warning::Slack post failed: $(printf '%s' "$RESP" | jq -r '.error // "unknown"')"
          fi
